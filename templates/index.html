<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magyar Scrabble</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <!-- Név bekérés -->
    <div id="name-screen" class="screen">
        <div class="center-box">
            <h1>Magyar Scrabble</h1>
            <input type="text" id="player-name" placeholder="A neved..." maxlength="20" autofocus>
            <button id="btn-set-name">Belépés</button>
        </div>
    </div>

    <!-- Lobby -->
    <div id="lobby-screen" class="screen hidden">
        <div class="lobby-container">
            <h1>Magyar Scrabble <span class="subtitle">Lobby</span></h1>
            <div class="lobby-actions">
                <div class="create-room">
                    <h3>Új szoba</h3>
                    <input type="text" id="room-name" placeholder="Szoba neve..." maxlength="30">
                    <select id="room-max-players">
                        <option value="2">2 játékos</option>
                        <option value="3">3 játékos</option>
                        <option value="4" selected>4 játékos</option>
                    </select>
                    <button id="btn-create-room">Létrehozás</button>
                </div>
            </div>
            <div class="rooms-list">
                <h3>Szobák</h3>
                <div id="rooms-container">
                    <p class="empty-msg">Nincs elérhető szoba.</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Várakozó szoba -->
    <div id="waiting-screen" class="screen hidden">
        <div class="center-box">
            <h2 id="waiting-room-name">Szoba</h2>
            <div id="waiting-players"></div>
            <button id="btn-start-game" class="hidden">Játék indítása</button>
            <button id="btn-leave-room" class="danger">Kilépés</button>
        </div>
    </div>

    <!-- Játék -->
    <div id="game-screen" class="screen hidden">
        <div class="game-layout">
            <!-- Bal oldali info panel -->
            <div class="side-panel">
                <h2>Pontok</h2>
                <div id="scoreboard"></div>
                <div class="game-info">
                    <div id="tiles-remaining">Zsák: -</div>
                    <div id="current-turn">-</div>
                    <div id="last-action" class="last-action"></div>
                </div>
                <div class="actions">
                    <button id="btn-place" class="action-btn" disabled>Lerak</button>
                    <button id="btn-exchange" class="action-btn" disabled>Csere</button>
                    <button id="btn-pass" class="action-btn" disabled>Passz</button>
                    <button id="btn-recall" class="action-btn">Visszavon</button>
                </div>
            </div>

            <!-- Tábla -->
            <div class="board-area">
                <div id="board" class="board"></div>
                <!-- Betűtartó -->
                <div id="hand" class="hand"></div>
            </div>
        </div>

        <!-- Joker dialog -->
        <div id="blank-dialog" class="dialog hidden">
            <div class="dialog-content">
                <h3>Válaszd ki a betűt</h3>
                <div id="blank-letters" class="blank-letters"></div>
            </div>
        </div>

        <!-- Játék vége dialog -->
        <div id="game-over-dialog" class="dialog hidden">
            <div class="dialog-content">
                <h2>Játék vége!</h2>
                <div id="final-scores"></div>
                <button id="btn-back-lobby">Vissza a lobbyba</button>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.4/socket.io.min.js"></script>
    <script src="/static/app.js"></script>
</body>
</html>
